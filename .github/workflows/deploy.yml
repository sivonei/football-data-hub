# deploy.yml - CI/CD pipeline for Football Data Hub
# Runs tests on every push and pull request to main branch

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      # Download the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies from requirements.txt
      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt

      # Run pytest
      - name: Run tests
        env:
          # Provide a fake key so the app loads without error
          # Tests accept 200 or 503 so this is fine
          FOOTBALL_API_KEY: fake-key-for-testing
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd api
          pytest tests/ -v